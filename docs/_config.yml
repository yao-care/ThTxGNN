# ThTxGNN Jekyll Configuration

title: "ThTxGNN รายงานการตรวจสอบการใช้ยาเก่าในข้อบ่งใช้ใหม่"
description: "ระบบคาดการณ์และตรวจสอบการใช้ยาเก่าในข้อบ่งใช้ใหม่สำหรับยาที่ขึ้นทะเบียนในประเทศไทย"
url: "https://thtxgnn.yao.care"
baseurl: ""
lang: "th"

remote_theme: just-the-docs/just-the-docs@v0.10.1

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# RSS Feed
feed:
  path: feed.xml
  collections:
    drugs:
      path: "/drugs/feed.xml"

# Open Graph
og_image: /assets/images/og-default.png

# Author (E-E-A-T)
author:
  name: ThTxGNN Team
  url: https://thtxgnn.yao.care/about/

# Kramdown Settings
kramdown:
  smart_quotes: ["apos", "apos", "quot", "quot"]
  typographic_symbols:
    ndash: "--"
    mdash: "---"

# Navigation
nav_sort: case_insensitive

# Search
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Footer
footer_content: "Copyright &copy; 2026 Yao.Care. รายงานนี้มีไว้เพื่อการวิจัยเท่านั้น ไม่ถือเป็นคำแนะนำทางการแพทย์"

# Color scheme
color_scheme: light

# Aux links
aux_links:
  "GitHub":
    - "https://github.com/yao-care/ThTxGNN"

# Back to top
back_to_top: true
back_to_top_text: "กลับขึ้นด้านบน"

# Exclude files
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - "*.template"

# Collections
collections:
  drugs:
    output: true
    permalink: /drugs/:name/
  news:
    output: true
    permalink: /news/:name/

defaults:
  - scope:
      path: "_drugs"
      type: "drugs"
    values:
      layout: "default"
      nav_exclude: false
  - scope:
      path: "_news"
      type: "news"
    values:
      layout: "default"
      nav_exclude: true
